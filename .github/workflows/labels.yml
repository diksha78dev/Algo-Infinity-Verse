name: labels
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  issues: write
jobs:
  create-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Create labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'bug', color: 'e11d21', description: 'Something is not working' },
              { name: 'feature-request', color: '0052cc', description: 'Request for a new feature' },
              { name: 'enhancement', color: '5319e7', description: 'Improvement to existing feature' },
              { name: 'ui/ux', color: '5319e7', description: 'UI/UX related issues' },
              { name: 'ssoc26', color: 'c2e0c6', description: 'SSO C26 project label' },
              { name: 'duplicate', color: 'cfd3d7', description: 'This issue or PR is a duplicate' },
              { name: 'invalid', color: 'eee', description: 'This does not seem right' },
              { name: 'help wanted', color: '008000', description: 'Extra attention is needed' }
            ];
            
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });
              } catch (err) {
                console.log(`Label ${label.name} may already exist`);
              }
            }