name: duplicate-issue
on:
  issues:
    types: [labeled]
permissions:
  issues: write
jobs:
  handle-duplicate:
    if: github.event.label.name == 'duplicate'
    runs-on: ubuntu-latest
    steps:
      - name: Comment on duplicate issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🔍 **Duplicate Issue Detected**\n\nThis issue appears to be a duplicate of an existing issue. Please check existing issues before creating new ones.\n\nIf you believe this is not a duplicate, please provide additional context explaining why.'
            })
      - name: Add duplicate label
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['duplicate']
            })
      - name: Lock conversation
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.lock({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              lock_reason: 'resolved'
            })