name: pr-welcome
on:
  pull_request:
    types: [opened, closed]
permissions:
  pull-requests: write
  issues: write
jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const payload = context.payload;
            const isMerged = payload.pull_request.merged;
            const authorAssociation = payload.pull_request.author_association;
            
            const isFirstTime = authorAssociation === 'NONE' || authorAssociation === 'CONTRIBUTOR';
            
            let message;
            if (isMerged) {
              message = isFirstTime
                ? '🎉 Welcome again! Your first contribution has been merged. Thank you for being part of this project!'
                : '🎉 Congratulations! Your pull request has been merged. Thank you for your contribution!';
            } else {
              message = isFirstTime
                ? '👋 Welcome! Thanks for your first contribution to the project! We will review it soon.'
                : '🎉 Thank you for your contribution! We appreciate your effort.';
            }
            
            await github.rest.issues.createComment({
              issue_number: payload.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });