<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSA Practice Tools — Algo Infinity Verse</title>
  <meta name="description" content="Your complete toolkit for DSA mastery. Analyze complexity, practice patterns, debug solutions, simulate algorithms, and track your learning growth." />

  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="tools.css" />

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <script>
    (function() {
      try {
        var t = localStorage.getItem('theme');
        var p = window.matchMedia('(prefers-color-scheme: light)').matches;
        var theme = t || (p ? 'light' : 'dark');
        if (theme === 'light') document.documentElement.classList.add('light-mode');
      } catch (e) {}
    })();
  </script>
</head>
<body data-page="tools" data-no-loading>

  <main>
    <!-- HERO -->
    <section class="tl-hero">
      <div class="tl-hero-bg" aria-hidden="true"></div>
      <button type="button" class="tl-back-btn" id="tlBackBtn" aria-label="Go back to previous page">
        <i class="fas fa-arrow-left"></i>
        <span>Back</span>
      </button>
      <div class="tl-hero-content">
        <h1 class="tl-hero-title">DSA Practice Tools</h1>
        <p class="tl-hero-subtitle">
          From complexity analysis to algorithm simulations — everything you need to sharpen your problem-solving skills and master data structures &amp; algorithms.
        </p>

        <!-- SEARCH -->
        <div class="tl-search-wrapper">
          <div class="tl-search">
            <i class="fas fa-search tl-search-icon"></i>
            <input
              type="text"
              id="tlSearchInput"
              class="tl-search-input"
              placeholder="Search practice tools..."
              aria-label="Search practice tools"
              autocomplete="off"
            />
            <button type="button" id="tlClearBtn" class="tl-clear-btn" aria-label="Clear search">
              <i class="fas fa-times"></i>
            </button>
            <span class="tl-search-hint">⌘K</span>
          </div>
        </div>

        <!-- FILTER CHIPS -->
        <div class="tl-filters" id="tlFilters" role="tablist" aria-label="Tool categories"></div>

        <p class="tl-result-count" id="tlResultCount">Showing <span id="tlCountDisplay">0</span> tools</p>
      </div>
    </section>

    <!-- CARD GRID -->
    <section class="tl-section">
      <div class="tl-container">
        <div class="tl-grid" id="tlGrid" role="list">
          <!-- Cards rendered by JS -->
        </div>
        <div class="tl-empty" id="tlEmpty" style="display:none;">
          <i class="fas fa-search-minus"></i>
          <h3>No tools found</h3>
          <p>Try adjusting your search or filter.</p>
        </div>
      </div>
    </section>
  </main>

  <script src="/auth.js"></script>
  <script src="/theme.js"></script>
  <script src="/script.js"></script>
  <script src="tools.js"></script>
</body>
</html>
