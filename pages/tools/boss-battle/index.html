<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Boss Battle Simulator | Algo-Infinity-Verse</title>
    <!-- Google Fonts for Retro Look -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="retro-navbar">
        <a href="../../../index.html" class="logo">⬅ FLEE BATTLE</a>
        <div class="level-display" id="level-display">LVL 1</div>
    </nav>

    <div class="game-container">
        <!-- RPG Battle Arena -->
        <div class="arena-panel">
            <div class="battle-scene">
                <div class="combatants">
                    <!-- Player Area -->
                    <div class="character player-area">
                        <div class="health-container">
                            <div class="name-tag">HERO</div>
                            <div class="health-bar-bg">
                                <div class="health-bar-fill player-hp" id="player-hp"></div>
                            </div>
                            <div class="hp-text" id="player-hp-text">100/100</div>
                        </div>
                        <img src="hero.png" id="player-sprite" class="sprite" alt="Hero Sprite">
                    </div>

                    <!-- Boss Area -->
                    <div class="character boss-area">
                        <div class="health-container boss-health-container">
                            <div class="name-tag" id="boss-name">THE ARRAY LEVIATHAN</div>
                            <div class="health-bar-bg">
                                <div class="health-bar-fill boss-hp" id="boss-hp"></div>
                            </div>
                            <div class="hp-text" id="boss-hp-text">500/500</div>
                        </div>
                        <img src="boss.png" id="boss-sprite" class="sprite" alt="Boss Sprite">
                    </div>
                </div>

                <!-- Overlay for Critical Hits or Damage -->
                <div id="damage-overlay" class="damage-overlay"></div>
            </div>

            <!-- Interactive Battle Log -->
            <div class="battle-log">
                <div id="log-content">
                    <p class="system-msg">A wild Array Leviathan appears!</p>
                    <p class="system-msg">Your task: Write a function `twoSum(nums, target)`.</p>
                </div>
            </div>
            
            <div class="player-stats">
                <div class="stat">COMBO: <span id="combo-counter" class="combo-text">0</span></div>
                <div class="stat xp-container">
                    XP: 
                    <div class="xp-bar-bg">
                        <div class="xp-bar-fill" id="xp-bar"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Code Editor Panel -->
        <div class="editor-panel">
            <div class="editor-header">
                SPELLBOOK (CODE EDITOR)
                <button id="attack-btn" class="attack-btn">CAST SPELL (EXECUTE)</button>
            </div>
            <textarea id="code-editor" spellcheck="false">function twoSum(nums, target) {
    // Write your logic here...
    
}</textarea>
            
            <div class="performance-summary" id="perf-summary">
                <h4>PERFORMANCE SUMMARY</h4>
                <p>Time: <span id="perf-time">-</span></p>
                <p>Complexity: <span id="perf-complexity">-</span></p>
                <p id="perf-edge-cases" class="perf-error"></p>
            </div>
        </div>
    </div>

    <!-- Victory/Defeat Screen -->
    <div id="end-screen" class="end-screen hidden">
        <h1 id="end-title">VICTORY!</h1>
        <p id="end-desc">You have defeated the Array Leviathan.</p>
        <button id="restart-btn" class="retro-btn">PLAY AGAIN</button>
    </div>

    <script src="battle.js"></script>
</body>
</html>
