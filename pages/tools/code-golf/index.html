<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Golf Arena | Algo-Infinity-Verse</title>
    <link rel="stylesheet" href="../../../assets/css/style.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Navbar fallback -->
    <nav class="golf-navbar">
        <a href="../../../index.html" class="logo"><i class="fas fa-arrow-left"></i> Algo-Infinity-Verse</a>
        <div class="nav-title">
            <i class="fas fa-golf-ball-tee text-green"></i> Code Golf Arena
        </div>
    </nav>

    <div class="golf-container">
        
        <!-- Left Panel: Challenges & Leaderboard -->
        <div class="left-panel">
            <div class="panel-section">
                <h2><i class="fas fa-list-check"></i> Select Challenge</h2>
                <select id="challenge-select" class="golf-select">
                    <option value="sumArray">Sum of Array (Easy)</option>
                    <option value="fizzBuzz">FizzBuzz Array (Medium)</option>
                    <option value="palindrome">Valid Palindrome (Medium)</option>
                </select>
                
                <div class="challenge-desc">
                    <h3 id="c-title">Sum of Array</h3>
                    <p id="c-desc">Write a function `f(a)` that takes an array of numbers and returns their sum.</p>
                </div>
            </div>

            <div class="panel-section flex-grow">
                <h2><i class="fas fa-trophy text-gold"></i> Top Community Golfers</h2>
                <p class="subtitle">Shortest valid solutions (Simulated)</p>
                
                <ul class="leaderboard" id="leaderboard">
                    <!-- Injected via JS -->
                </ul>
            </div>
        </div>

        <!-- Center Panel: The Editor & Heatmap -->
        <div class="main-panel">
            <div class="editor-header">
                <div class="metrics">
                    <div class="metric-box">
                        <span class="m-label">CHARS</span>
                        <span class="m-value" id="char-count">0</span>
                    </div>
                    <div class="metric-box primary">
                        <span class="m-label">BYTES</span>
                        <span class="m-value" id="byte-count">0</span>
                    </div>
                </div>
                
                <div class="actions">
                    <button id="btn-heatmap" class="btn btn-outline" title="Toggle Optimization Heatmap">
                        <i class="fas fa-fire"></i> Heatmap
                    </button>
                    <button id="btn-run" class="btn btn-solid">
                        <i class="fas fa-play"></i> Run Tests
                    </button>
                </div>
            </div>

            <div class="editor-container">
                <!-- We use a textarea for input and a pre/code block behind it for the heatmap -->
                <div class="heatmap-layer" id="heatmap-layer"></div>
                <textarea id="code-editor" spellcheck="false" placeholder="Write your shortest code here..."></textarea>
            </div>
            
            <div class="terminal" id="terminal">
                <div class="terminal-header">Execution Logs</div>
                <div class="terminal-body" id="terminal-out">
                    <p>&gt; Ready for execution.</p>
                </div>
            </div>
        </div>

    </div>

    <script src="golf.js"></script>
</body>
</html>
