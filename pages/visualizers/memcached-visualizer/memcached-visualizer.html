<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memcached Visualizer | Algo Infinity Verse</title>
    <link rel="stylesheet" href="memcached-visualizer.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <script src="memcached-visualizer.js" defer></script>
  </head>
  <body data-page="memcached-visualizer">
    <div class="glass-panel top-bar">
      <div class="header-info">
        <h2>System Design: Memcached Distributed Cache</h2>
        <p class="status" role="status" aria-live="polite" id="main-status">
          Status: Cluster Initialized | Nodes: 3
        </p>
      </div>
      <div class="controls">
        <button type="button" id="btn-add-node" class="btn outline" aria-label="Add Node">
          <i class="fas fa-plus"></i> Add Node
        </button>
        <button type="button" id="btn-remove-node" class="btn outline" aria-label="Remove Node">
          <i class="fas fa-minus"></i> Remove Node
        </button>
        <div class="divider"></div>
        <button type="button" id="btn-reset" class="btn danger" aria-label="Reset Cache">
          <i class="fas fa-undo"></i> Reset
        </button>
      </div>
    </div>

    <div class="workspace">
      <aside class="side-panel left-panel glass-panel">
        <div class="panel-section">
          <h3><i class="fas fa-database"></i> Operations</h3>

          <div class="param-grid" style="margin-bottom: 1rem">
            <label>Set(Key, Value, TTL)</label>
            <input
              type="text"
              id="input-set-k"
              class="glass-input"
              placeholder="Key (e.g., user:1)"
            />
            <input type="text" id="input-set-v" class="glass-input" placeholder="Value" />
            <input
              type="number"
              id="input-set-ttl"
              class="glass-input"
              placeholder="TTL (sec)"
              value="10"
            />
            <button
              type="button"
              id="btn-set"
              class="btn outline"
              style="grid-column: 1 / 4; justify-content: center"
            >
              <i class="fas fa-download"></i> Set
            </button>
          </div>

          <div class="param-grid" style="margin-bottom: 1.5rem">
            <label>Get(Key)</label>
            <input
              type="text"
              id="input-get-k"
              class="glass-input"
              placeholder="Key (e.g., user:1)"
              style="grid-column: 1 / 4"
            />
            <button
              type="button"
              id="btn-get"
              class="btn outline"
              style="grid-column: 1 / 4; justify-content: center"
            >
              <i class="fas fa-search"></i> Get
            </button>
          </div>

          <div class="param-grid" style="margin-bottom: 1.5rem">
            <label>Delete(Key)</label>
            <input
              type="text"
              id="input-delete-k"
              class="glass-input"
              placeholder="Key (e.g., user:1)"
              style="grid-column: 1 / 4"
            />
            <button
              type="button"
              id="btn-delete"
              class="btn outline"
              style="grid-column: 1 / 4; justify-content: center"
            >
              <i class="fas fa-trash"></i> Delete
            </button>
          </div>
        </div>

        <div class="panel-section" style="flex: 1">
          <h3><i class="fas fa-chart-pie"></i> Metrics</h3>
          <div
            class="metrics-grid"
            style="display: flex; gap: 1rem; justify-content: space-around; padding: 1rem"
          >
            <div class="metric-box" style="text-align: center">
              <div class="metric-label">Cache Hits</div>
              <div
                class="metric-value"
                id="metric-hits"
                style="font-size: 1.5rem; font-weight: bold; color: var(--success-color, #2ecc71)"
              >
                0
              </div>
            </div>
            <div class="metric-box" style="text-align: center">
              <div class="metric-label">Cache Misses</div>
              <div
                class="metric-value"
                id="metric-misses"
                style="font-size: 1.5rem; font-weight: bold; color: var(--danger-color, #e74c3c)"
              >
                0
              </div>
            </div>
            <div class="metric-box" style="text-align: center">
              <div class="metric-label">Hit Ratio</div>
              <div
                class="metric-value"
                id="metric-ratio"
                style="font-size: 1.5rem; font-weight: bold; color: var(--primary-color, #3498db)"
              >
                0%
              </div>
            </div>
          </div>
        </div>
      </aside>

      <main class="canvas-container">
        <div class="architecture-stage">
          <div class="system-component application" id="app-node">
            <i class="fas fa-mobile-alt"></i>
            <span>Application</span>
          </div>

          <div class="cluster-container" id="cluster-container">
            <h4 class="stage-label">Memcached Cluster</h4>
            <div class="ring" id="hash-ring">
              <!-- Nodes generated via JS -->
            </div>
          </div>

          <div class="system-component database" id="db-node">
            <i class="fas fa-server"></i>
            <span>Database</span>
          </div>

          <!-- SVG for drawing animated paths -->
          <svg id="animation-svg" class="animation-svg"></svg>
        </div>
      </main>
    </div>

    <script src="../../../theme.js" defer></script>
  </body>
</html>
