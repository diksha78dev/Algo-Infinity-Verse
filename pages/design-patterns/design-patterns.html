<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced Design Patterns (GoF)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="design-patterns.css" />
  </head>
  <body class="bg-gray-50 text-gray-800 font-sans min-h-screen">
    <nav class="bg-indigo-600 text-white p-4 shadow-md sticky top-0 z-50">
      <div class="container mx-auto flex items-center justify-between">
        <a
          href="../../index.html"
          class="text-xl font-bold hover:text-indigo-200 transition-colors"
        >
          <i class="fas fa-arrow-left mr-2"></i> Algo Infinity Verse
        </a>
        <h1 class="text-xl font-bold hidden sm:block">GoF Design Patterns</h1>
        <div>
          <button id="theme-toggle" class="p-2 rounded-full hover:bg-indigo-700 transition-colors" aria-label="Toggle dark mode">
            <i class="fas fa-moon"></i>
          </button>
        </div>
      </div>
    </nav>

    <header class="container mx-auto px-4 py-12 text-center">
      <h2 class="text-4xl font-bold text-indigo-900 mb-4 dark-title">
        Advanced Design Patterns (GoF)
      </h2>
      <p class="text-lg text-gray-600 max-w-2xl mx-auto dark-text">
        Master the Gang of Four software design patterns to solve common architectural problems
        efficiently.
      </p>
    </header>

    <main class="container mx-auto px-4 pb-16">
      <!-- Filter/Tabs -->
      <div class="flex flex-wrap justify-center gap-4 mb-8">
        <button
          class="filter-btn active px-6 py-2 rounded-full font-medium transition-all"
          data-category="all"
          aria-pressed="true"
        >
          All
        </button>
        <button
          class="filter-btn px-6 py-2 rounded-full font-medium transition-all"
          data-category="creational"
          aria-pressed="false"
        >
          Creational
        </button>
        <button
          class="filter-btn px-6 py-2 rounded-full font-medium transition-all"
          data-category="structural"
          aria-pressed="false"
        >
          Structural
        </button>
        <button
          class="filter-btn px-6 py-2 rounded-full font-medium transition-all"
          data-category="behavioral"
          aria-pressed="false"
        >
          Behavioral
        </button>
      </div>

      <!-- Pattern Grid -->
      <div id="patterns-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Populated by JS -->
      </div>
    </main>

    <script src="design-patterns.js"></script>
  </body>
</html>
